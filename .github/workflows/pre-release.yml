name: Pre-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (e.g. 0.3.0-rc.1)"
        required: true
        type: string
      lspVersion:
        description: "lsp version to bundle"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.vsce_target }}
    strategy:
      matrix:
        include:
          - vsce_target: win32-x64
            go_os: windows
            go_arch: amd64
            archive_ext: zip
          - vsce_target: win32-arm64
            go_os: windows
            go_arch: arm64
            archive_ext: zip
          - vsce_target: linux-x64
            go_os: linux
            go_arch: amd64
            archive_ext: tar.gz
          - vsce_target: linux-arm64
            go_os: linux
            go_arch: arm64
            archive_ext: tar.gz
          - vsce_target: darwin-x64
            go_os: darwin
            go_arch: amd64
            archive_ext: tar.gz
          - vsce_target: darwin-arm64
            go_os: darwin
            go_arch: arm64
            archive_ext: tar.gz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download lsp
        env:
          GH_TOKEN: ${{ github.token }} 
        run: |
          mkdir -p bin
          LSP_VERSION="${{ inputs.lspVersion }}"
          OS="${{ matrix.go_os }}"
          ARCH="${{ matrix.go_arch }}"
          EXT="${{ matrix.archive_ext }}"
          ARCHIVE="lsp_${OS}_${ARCH}.${EXT}"

          gh release download "v${LSP_VERSION}" \
            --repo infracost/lsp \
            --pattern "${ARCHIVE}" \
            --dir /tmp

          EXTRACT_DIR=$(mktemp -d)
          if [ "${EXT}" = "zip" ]; then
            unzip -o "/tmp/${ARCHIVE}" -d "${EXTRACT_DIR}"
          else
            tar xzf "/tmp/${ARCHIVE}" -C "${EXTRACT_DIR}"
          fi

          SUFFIX=""
          if [ "${OS}" = "windows" ]; then SUFFIX=".exe"; fi

          find "${EXTRACT_DIR}" -name "infracost-ls${SUFFIX}" -type f -exec mv {} "bin/infracost-ls${SUFFIX}" \;
          chmod +x "bin/infracost-ls${SUFFIX}"
          rm -rf "${EXTRACT_DIR}"

      - name: List bin contents
        run: ls -la bin/

      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Package extension
        run: npm run vscode:package -- --target=${{ matrix.vsce_target }} --pre-release

      - name: Upload vsix as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vsce_target }}
          path: "*.vsix"

  release:
    name: Create Pre-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ inputs.version }}" \
            --prerelease \
            --generate-notes \
            artifacts/**/*.vsix
